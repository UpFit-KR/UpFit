<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a56db">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="핵방노트">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <!-- 이 페이지 자체가 HTTP 캐시에 남지 않도록 -->
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <title>로그인 처리중 — 마이빌딩</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #1a56db;
            --blue-light: #e8f0fe;
            --blue-dark: #1e429f;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --radius-xl: 20px;
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.20), 0 4px 12px rgba(0,0,0,0.12);
            --font: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }

        html, body { height: 100%; font-family: var(--font); }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(160deg, var(--blue) 0%, var(--blue-dark) 100%);
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
        }
        body::before { width: 320px; height: 320px; top: -120px; right: -100px; }
        body::after  { width: 260px; height: 260px; bottom: -110px; left: -90px; }

        .loading-container {
            position: relative;
            z-index: 1;
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 44px 40px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            animation: cardIn 0.45s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 56px; height: 56px; margin: 0 auto 18px;
            border-radius: 16px;
            background: var(--blue-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
        }

        .loading-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 22px;
            white-space: nowrap;
        }

        .spinner {
            width: 44px; height: 44px; margin: 0 auto;
            border: 4px solid var(--blue-light);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-subtext {
            margin-top: 22px;
            font-size: 14px;
            color: var(--gray-500);
        }

        .dots { display: inline-block; width: 1.4em; text-align: left; }
        .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (prefers-reduced-motion: reduce) {
            .loading-container { animation: none; }
            .spinner { animation-duration: 1.8s; }
        }
    </style>
</head>
<body>
<div class="loading-container">
    <div class="brand-logo">🏢</div>
    <div class="loading-text">로그인 중입니다<span class="dots"></span></div>
    <div class="spinner"></div>
    <div class="loading-subtext">잠시만 기다려 주세요</div>
</div>

<!-- 캐시버스팅 버전 올림: 1.0.0 → 1.0.1 -->
<script src="config.js?v=1.0.1"></script>
<script>
    // =====================================================
    // 0) 옛 Service Worker / 캐시 자가 정리
    //    "됐다 안됐다"의 주범인 stale 캐시를 이번 진입에서 끊어준다.
    //    (옛 POST 버전이 캐시에 남아 간헐적으로 실행되던 것을 차단)
    //    ※ 이 페이지는 인가코드를 들고 있으므로 reload 하지 않는다.
    // =====================================================
    (function cleanupStaleCaches() {
        try {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations()
                    .then(regs => regs.forEach(r => r.unregister()))
                    .catch(() => {});
            }
            if (window.caches && caches.keys) {
                caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
            }
        } catch (_) {}
    })();

    const BACKEND_BASE = (window.APP_CONFIG && window.APP_CONFIG.BACKEND_BASE);
    const SUCCESS_REDIRECT = 'main.html';
    const LOGIN_PAGE = 'login.html';

    document.addEventListener('DOMContentLoaded', async function () {
        const params = new URLSearchParams(window.location.search);

        // ── 방법 2: 백엔드가 ?token=... 으로 보낸 경우 ──
        const tokenParam = params.get('token') || params.get('accessToken');
        if (tokenParam) {
            localStorage.clear();
            localStorage.setItem('accessToken', tokenParam);
            window.location.href = SUCCESS_REDIRECT;
            return;
        }

        // 소셜 측 에러(사용자 취소 등)를 직접 받은 경우
        if (params.get('error')) {
            alert('소셜 로그인 오류: ' + (params.get('error_description') || params.get('error')));
            window.location.href = LOGIN_PAGE;
            return;
        }

        // ── 방법 1: ?code=... 인가코드 교환 ──
        const code = params.get('code');
        const stateProvider = (params.get('state') || '').split('__')[0];
        const provider = stateProvider || sessionStorage.getItem('provider') || params.get('provider');

        if (!BACKEND_BASE) {
            alert('BACKEND_BASE 설정이 없습니다. config.js를 확인하세요.');
            window.location.href = LOGIN_PAGE;
            return;
        }
        if (!code) {
            alert('인가 코드가 존재하지 않습니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }
        if (!provider) {
            alert('소셜 제공자 정보를 찾을 수 없습니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }

        // ── 인가코드 1회성 가드 ──
        // 인가코드는 1번만 교환 가능. 새로고침/뒤로가기(bfcache)로 같은 code가
        // 두 번 교환되면 간헐적으로 실패하므로, 이미 처리한 code면 중단한다.
        if (sessionStorage.getItem('usedCode') === code) {
            console.warn('[oauth] 이미 처리한 인가코드 → 재교환 방지');
            window.location.href = LOGIN_PAGE;
            return;
        }
        sessionStorage.setItem('usedCode', code);

        const endpoints = {
            kakao:  `${BACKEND_BASE}/user/oauth2/code/kakao`,
            naver:  `${BACKEND_BASE}/user/oauth2/code/naver`,
            google: `${BACKEND_BASE}/user/oauth2/code/google`
        };
        const endpoint = endpoints[provider];
        if (!endpoint) {
            alert('지원하지 않는 소셜 로그인입니다.');
            window.location.href = LOGIN_PAGE;
            return;
        }

        const requestUrl = `${endpoint}?code=${encodeURIComponent(code)}`;
        console.log('[oauth] 교환 요청 → method=GET, url=', requestUrl); // 디버그용

        try {
            const response = await fetch(requestUrl, {
                method: 'GET',       // 백엔드 GET 매핑과 일치
                cache: 'no-store'    // 캐시/재생 차단
            });

            if (!response.ok) {
                let msg = `로그인 처리 실패 (HTTP ${response.status})`;
                try { const e = await response.json(); msg = e.message || msg; } catch (_) {}
                console.error('[oauth] 실패 응답:', response.status, response.statusText);
                alert(msg);
                window.location.href = LOGIN_PAGE;
                return;
            }

            const data = await response.json(); // JWTDTO

            localStorage.clear();
            const token = data.token || data.accessToken || data.jwt || '';
            if (token) localStorage.setItem('accessToken', token);
            if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
            localStorage.setItem('auth', JSON.stringify(data));

            sessionStorage.removeItem('provider');
            sessionStorage.removeItem('usedCode');

            window.location.href = SUCCESS_REDIRECT;
        } catch (error) {
            console.error('OAuth 로그인 처리 오류:', error);
            alert('로그인 처리 중 오류가 발생했습니다. (콘솔 로그 확인)');
            window.location.href = LOGIN_PAGE;
        }
    });
</script>
</body>
</html>
