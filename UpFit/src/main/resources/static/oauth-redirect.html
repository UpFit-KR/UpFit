<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#eef2f8">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0">
    <title>로그인 처리중 — UpFit</title>

    <!-- [B] edit by smsong : 공통 테마 모듈 (인증 게이트는 이 페이지에 적용하지 않음) -->
    <script src="theme.js?v=1.0.3"></script>
    <!-- [E] edit by smsong -->

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* [B] edit by smsong : :root = 라이트(기본) / [data-theme="dark"] = 다크 */
        :root {
            color-scheme: light;
            --text: #0e2138;
            --text-dim: #4a5f7a;
            --radius-xl: 22px;
            --shadow-lg: 0 20px 50px rgba(23,49,84,0.16);
            --page-bg:
                radial-gradient(120% 90% at 50% -10%, rgba(56,189,248,0.22), transparent 55%),
                radial-gradient(120% 90% at 50% 110%, rgba(45,212,160,0.20), transparent 55%),
                #eef2f8;
            --glow-1: rgba(56,189,248,0.22);
            --glow-2: rgba(45,212,160,0.20);
            --card-bg: rgba(255,255,255,0.86);
            --card-line: rgba(14,33,56,0.08);
            --logo-shadow: 0 12px 28px rgba(23,49,84,0.18);
            --spin-track: rgba(2,132,199,0.18);
            --spin-head: #0d9488;
            --font: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
            --text: #e8f0fb;
            --text-dim: #93a4bd;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.5);
            --page-bg:
                radial-gradient(120% 90% at 50% -10%, rgba(56,189,248,0.16), transparent 55%),
                radial-gradient(120% 90% at 50% 110%, rgba(45,212,160,0.14), transparent 55%),
                #071120;
            --glow-1: rgba(56,189,248,0.14);
            --glow-2: rgba(45,212,160,0.14);
            --card-bg: rgba(17,37,61,0.72);
            --card-line: rgba(255,255,255,0.07);
            --logo-shadow: 0 12px 28px rgba(0,0,0,0.45);
            --spin-track: rgba(56,189,248,0.18);
            --spin-head: #2dd4a0;
        }
        /* [E] edit by smsong */

        /* [B] edit by smsong : 하단 흰 여백(홈 인디케이터 영역) 제거 — 2차 수정
           배경을 전용 고정 레이어(.app-bg)로 분리해 세이프에어리어 바깥까지 덮는다. */
        html {
            height: 100%;
            background-color: #eef2f8;   /* 캔버스 폴백(단색) */
            overflow: hidden;
        }
        :root[data-theme="dark"] { background-color: #071120; }
        body {
            height: 100%; font-family: var(--font);
            position: fixed; inset: 0; width: 100%;
            overflow: hidden; overscroll-behavior: none; touch-action: none;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            padding-top: max(24px, env(safe-area-inset-top));   /* 하단은 꽉 채우고 여백은 위로 */
        }
        .app-bg {
            position: fixed; inset: -120px; z-index: -1; pointer-events: none;
            background: var(--page-bg);
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        /* [E] edit by smsong */

        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(30px); pointer-events: none;
        }
        body::before { width: 300px; height: 300px; top: -90px; right: -70px; background: var(--glow-1); }
        body::after  { width: 260px; height: 260px; bottom: -90px; left: -70px; background: var(--glow-2); }

        .loading-container {
            position: relative; z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-line);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(16px);
            padding: 44px 40px; text-align: center;
            width: 100%; max-width: 340px;
            animation: cardIn 0.45s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 60px; height: 60px; margin: 0 auto 18px;
            border-radius: 16px; display: block; object-fit: cover;
            box-shadow: var(--logo-shadow);
        }

        .loading-text {
            font-size: 18px; font-weight: 700; color: var(--text);
            margin-bottom: 22px; white-space: nowrap;
        }

        .spinner {
            width: 44px; height: 44px; margin: 0 auto;
            border: 4px solid var(--spin-track);
            border-top-color: var(--spin-head);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-subtext { margin-top: 22px; font-size: 14px; color: var(--text-dim); }

        .dots { display: inline-block; width: 1.4em; text-align: left; }
        .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (prefers-reduced-motion: reduce) {
            .loading-container { animation: none; }
            .spinner { animation-duration: 1.8s; }
        }
    </style>
</head>
<body>
<!-- [B][E] edit by smsong : 배경 전용 고정 레이어 -->
<div class="app-bg" aria-hidden="true"></div>

<div class="loading-container">
    <!-- [B] edit by smsong : 테마별 로고 자동 교체 -->
    <img class="brand-logo" src="icons/upfit-light.png" data-theme-logo alt="UpFit">
    <!-- [E] edit by smsong -->
    <div class="loading-text">로그인 중입니다<span class="dots"></span></div>
    <div class="spinner"></div>
    <div class="loading-subtext">잠시만 기다려 주세요</div>
</div>

<script src="config.js?v=1.0.1"></script>
<script>
    // =====================================================
    // 0) 옛 Service Worker / 캐시 자가 정리
    //    이 페이지는 인가코드를 들고 있으므로 reload 하지 않는다.
    // =====================================================
    (function cleanupStaleCaches() {
        try {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations()
                    .then(regs => regs.forEach(r => r.unregister())).catch(() => {});
            }
            if (window.caches && caches.keys) {
                caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
            }
        } catch (_) {}
    })();

    const BACKEND_BASE = (window.APP_CONFIG && window.APP_CONFIG.BACKEND_BASE);
    const SUCCESS_REDIRECT = 'main.html';
    const LOGIN_PAGE = 'login.html';

    // [B] edit by smsong
    // localStorage.clear() 는 테마 설정(UF_THEME)까지 지워버리므로 인증 키만 선별 제거
    function clearAuthKeys() {
        try {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('auth');
        } catch (_) {}
    }
    // [E] edit by smsong

    document.addEventListener('DOMContentLoaded', async function () {
        const params = new URLSearchParams(window.location.search);

        // ── 방법 2: 백엔드가 ?token=... 으로 보낸 경우 ──
        const tokenParam = params.get('token') || params.get('accessToken');
        if (tokenParam) {
            clearAuthKeys();
            localStorage.setItem('accessToken', tokenParam);
            window.location.href = SUCCESS_REDIRECT;
            return;
        }

        if (params.get('error')) {
            alert('소셜 로그인 오류: ' + (params.get('error_description') || params.get('error')));
            window.location.href = LOGIN_PAGE;
            return;
        }

        // ── 방법 1: ?code=... 인가코드 교환 ──
        const code = params.get('code');
        const stateProvider = (params.get('state') || '').split('__')[0];
        const provider = stateProvider || sessionStorage.getItem('provider') || params.get('provider');

        if (!BACKEND_BASE) {
            alert('BACKEND_BASE 설정이 없습니다. config.js를 확인하세요.');
            window.location.href = LOGIN_PAGE; return;
        }
        if (!code) {
            alert('인가 코드가 존재하지 않습니다.');
            window.location.href = LOGIN_PAGE; return;
        }
        if (!provider) {
            alert('소셜 제공자 정보를 찾을 수 없습니다.');
            window.location.href = LOGIN_PAGE; return;
        }

        // ── 인가코드 1회성 가드 ──
        if (sessionStorage.getItem('usedCode') === code) {
            console.warn('[oauth] 이미 처리한 인가코드 → 재교환 방지');
            window.location.href = LOGIN_PAGE; return;
        }
        sessionStorage.setItem('usedCode', code);

        const endpoints = {
            kakao:  `${BACKEND_BASE}/user/oauth2/code/kakao`,
            naver:  `${BACKEND_BASE}/user/oauth2/code/naver`,
            google: `${BACKEND_BASE}/user/oauth2/code/google`
        };
        const endpoint = endpoints[provider];
        if (!endpoint) {
            alert('지원하지 않는 소셜 로그인입니다.');
            window.location.href = LOGIN_PAGE; return;
        }

        const requestUrl = `${endpoint}?code=${encodeURIComponent(code)}`;
        console.log('[oauth] 교환 요청 → method=GET, url=', requestUrl);

        try {
            const response = await fetch(requestUrl, { method: 'GET', cache: 'no-store' });

            if (!response.ok) {
                let msg = `로그인 처리 실패 (HTTP ${response.status})`;
                try { const e = await response.json(); msg = e.message || msg; } catch (_) {}
                console.error('[oauth] 실패 응답:', response.status, response.statusText);
                alert(msg);
                window.location.href = LOGIN_PAGE; return;
            }

            const data = await response.json(); // JWTDTO

            clearAuthKeys();
            const token = data.token || data.accessToken || data.jwt || '';
            if (!token) {
                alert('토큰을 발급받지 못했습니다. 다시 로그인해 주세요.');
                window.location.href = LOGIN_PAGE; return;
            }
            localStorage.setItem('accessToken', token);
            if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
            localStorage.setItem('auth', JSON.stringify(data));

            sessionStorage.removeItem('provider');
            sessionStorage.removeItem('usedCode');

            window.location.href = SUCCESS_REDIRECT;
        } catch (error) {
            console.error('OAuth 로그인 처리 오류:', error);
            alert('로그인 처리 중 오류가 발생했습니다. (콘솔 로그 확인)');
            window.location.href = LOGIN_PAGE;
        }
    });
</script>
</body>
</html>
