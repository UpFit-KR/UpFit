<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#071120">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <title>UpFit</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<!-- 아이콘 그라데이션 정의 (활성 네비 아이콘용) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
        <linearGradient id="navgrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#2dd4a0"/>
        </linearGradient>
    </defs>
</svg>

<div class="app">
    <!-- 헤더 -->
    <header class="app-header">
        <img class="logo" src="icons/upfit.png" alt="UpFit">
        <div class="head-txt">
            <div class="hello">안녕하세요, <b id="hdrName">회원</b>님</div>
            <div class="today" id="hdrDate">—</div>
        </div>
        <div class="head-brand">UPFIT</div>
    </header>

    <!-- 콘텐츠 -->
    <main class="app-main" id="appMain">

        <!-- ============ 홈 ============ -->
        <section class="view active" id="view-home"></section>

        <!-- ============ 운동 ============ -->
        <section class="view" id="view-workout"></section>

        <!-- ============ 식단 ============ -->
        <section class="view" id="view-diet"></section>

        <!-- ============ 변화 ============ -->
        <section class="view" id="view-change"></section>

        <!-- ============ 내 정보 ============ -->
        <section class="view" id="view-profile"></section>
    </main>

    <!-- 하단 네비 -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
            <span>홈</span>
        </button>
        <button class="nav-item" data-tab="workout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M4 8l-1 1a1.4 1.4 0 0 0 0 2l1 1"/><path d="M8 4 7 5a1.4 1.4 0 0 0 0 2l1 1"/><path d="M20 16l1-1a1.4 1.4 0 0 0 0-2l-1-1"/><path d="M16 20l1-1a1.4 1.4 0 0 0 0-2l-1-1"/></svg>
            <span>운동</span>
        </button>
        <button class="nav-item" data-tab="diet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3v18M8 3v6a3 3 0 0 0 3 3"/><path d="M17 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4 2.5-1 2.5-4-1-5-2.5-5Z"/><path d="M17 12v9"/></svg>
            <span>식단</span>
        </button>
        <button class="nav-item" data-tab="change">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 3-4 3 3 5-7"/></svg>
            <span>변화</span>
        </button>
        <button class="nav-item" data-tab="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            <span>내 정보</span>
        </button>
    </nav>
</div>

<!-- 바텀시트 (운동/식단 입력) -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet"></div>

<!-- 토스트 -->
<div id="toast"></div>

<script src="config.js?v=1.0.1"></script>
<script src="main.js?v=1.0.1"></script>
</body>
</html>
