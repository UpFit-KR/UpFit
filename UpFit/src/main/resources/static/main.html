<!DOCTYPE html>
<!-- [B] edit by smsong : data-require-auth → auth.js 가 로드 즉시 토큰 검사 후 login.html 로 강제 이동 -->
<html lang="ko" data-require-auth>
<!-- [E] edit by smsong -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#eef2f8">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <title>UpFit</title>

    <!-- [B] edit by smsong : 테마 → 인증 순서로 <head> 에서 먼저 실행 (깜빡임 방지 + 미인증 조기 차단) -->
    <script src="theme.js?v=1.0.3"></script>
    <script src="auth.js?v=1.0.3"></script>
    <!-- [E] edit by smsong -->

    <link rel="stylesheet" href="main.css?v=1.0.6">
</head>
<body>
<!-- 아이콘 그라데이션 정의 (활성 네비 아이콘용) -->
<!-- [B] edit by smsong : stop-color 를 CSS 변수로 제어 → 테마별 색상 자동 반영 -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
        <linearGradient id="navgrad" x1="0" y1="0" x2="1" y2="1">
            <stop class="navgrad-a" offset="0%"/>
            <stop class="navgrad-b" offset="100%"/>
        </linearGradient>
    </defs>
</svg>
<!-- [E] edit by smsong -->

<div class="app">
    <!-- 헤더 -->
    <header class="app-header">
        <!-- [B] edit by smsong : data-theme-logo → theme.js 가 테마별 로고로 교체 -->
        <img class="logo" src="icons/upfit-light.png" data-theme-logo alt="UpFit">
        <div class="head-txt">
            <div class="hello" id="hdrHello" style="display:none">안녕하세요, <b id="hdrName"></b>님</div>
            <div class="today" id="hdrDate"></div>
        </div>
        <!-- [E] edit by smsong -->
        <div class="head-brand">UPFIT</div>
    </header>

    <!-- 콘텐츠 -->
    <main class="app-main" id="appMain">

        <!-- ============ 홈 ============ -->
        <section class="view active" id="view-home"></section>

        <!-- ============ 운동 ============ -->
        <section class="view" id="view-workout"></section>

        <!-- ============ 식단 ============ -->
        <section class="view" id="view-diet"></section>

        <!-- ============ 변화 ============ -->
        <section class="view" id="view-change"></section>

        <!-- ============ 내 정보 ============ -->
        <section class="view" id="view-profile"></section>
    </main>

    <!-- 하단 네비 -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>
            <span>홈</span>
        </button>
        <button class="nav-item" data-tab="workout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M4 8l-1 1a1.4 1.4 0 0 0 0 2l1 1"/><path d="M8 4 7 5a1.4 1.4 0 0 0 0 2l1 1"/><path d="M20 16l1-1a1.4 1.4 0 0 0 0-2l-1-1"/><path d="M16 20l1-1a1.4 1.4 0 0 0 0-2l-1-1"/></svg>
            <span>운동</span>
        </button>
        <button class="nav-item" data-tab="diet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3v18M8 3v6a3 3 0 0 0 3 3"/><path d="M17 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4 2.5-1 2.5-4-1-5-2.5-5Z"/><path d="M17 12v9"/></svg>
            <span>식단</span>
        </button>
        <button class="nav-item" data-tab="change">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 3-4 3 3 5-7"/></svg>
            <span>변화</span>
        </button>
        <button class="nav-item" data-tab="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            <span>내 정보</span>
        </button>
    </nav>
</div>

<!-- 바텀시트 1차 (운동 기록/식단/체중/프로필/설정) -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet"></div>

<!-- [B] edit by smsong : 바텀시트 2차 — 운동 입력 전용. 1차(운동 기록) 시트 위에 겹쳐 열린다.
     날짜(세션) 폼과 운동 폼을 완전히 분리하기 위한 별도 레이어. -->
<div class="sheet-backdrop lv2" id="sheetBackdrop2"></div>
<div class="sheet lv2" id="sheet2"></div>
<!-- [E] edit by smsong -->

<!-- 토스트 -->
<div id="toast"></div>

<script src="config.js?v=1.0.1"></script>
<script src="main.js?v=1.0.6"></script>
</body>
</html>
