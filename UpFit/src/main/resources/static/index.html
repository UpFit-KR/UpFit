<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#071120">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <title>UpFit</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink-950: #071120;
            --ink-900: #0b1a2e;
            --blue: #38bdf8;
            --green: #2dd4a0;
            --white: #ffffff;
            --font: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }

        html, body { height: 100%; font-family: var(--font); }
        /* 하단 흰 여백 방지 + 스크롤/바운스 차단 */
        html { background: var(--ink-950); }
        body {
            background: var(--ink-950);
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed; inset: 0; width: 100%;
        }

        .intro {
            height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            background:
                radial-gradient(120% 90% at 50% -10%, rgba(56,189,248,0.16), transparent 55%),
                radial-gradient(120% 90% at 50% 110%, rgba(45,212,160,0.14), transparent 55%),
                var(--ink-950);
            position: relative; overflow: hidden;
            opacity: 1; transition: opacity 0.55s ease;
        }
        .intro.leaving { opacity: 0; }

        /* 은은한 광원 */
        .intro::before, .intro::after {
            content: ''; position: absolute; border-radius: 50%;
            pointer-events: none; filter: blur(30px);
        }
        .intro::before { width: 300px; height: 300px; top: -90px; right: -70px; background: rgba(56,189,248,0.14); }
        .intro::after  { width: 260px; height: 260px; bottom: -90px; left: -70px; background: rgba(45,212,160,0.14); }

        .intro-inner {
            position: relative; z-index: 1; text-align: center;
            opacity: 0; transform: translateY(14px);
            animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes rise { to { opacity: 1; transform: translateY(0); } }

        .logo {
            width: 108px; height: 108px; margin: 0 auto 22px;
            border-radius: 28px;
            display: block; object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .name {
            font-size: 30px; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(100deg, var(--blue), var(--green));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .tagline {
            margin-top: 12px;
            font-size: 15px; line-height: 1.6;
            color: rgba(232,240,251,0.72);
            font-weight: 500;
        }

        .dots { margin-top: 30px; display: flex; gap: 7px; justify-content: center; }
        .dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: linear-gradient(120deg, var(--blue), var(--green));
            animation: blink 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .skip {
            position: absolute; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%;
            transform: translateX(-50%); z-index: 2;
            color: rgba(232,240,251,0.85);
            font-size: 13px; font-weight: 600;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px; padding: 9px 20px;
            cursor: pointer; font-family: var(--font);
            backdrop-filter: blur(6px);
        }
        .skip:active { background: rgba(255,255,255,0.16); }

        @media (prefers-reduced-motion: reduce) {
            .intro-inner { animation: none; opacity: 1; transform: none; }
            .logo { animation: none; }
            .dots span { animation: none; opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="intro" id="intro">
        <div class="intro-inner">
            <img class="logo" src="icons/upfit.png" alt="UpFit">
            <div class="name">UPFIT</div>
            <div class="tagline">오늘의 운동과 식단을 기록하고<br>어제보다 얼마나 성장했는지 확인하세요</div>
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <button class="skip" id="skip">바로 시작하기</button>
    </div>

    <script>
        (function () {
            var NEXT = 'login.html';
            var STAY = 2200;
            var FADE = 550;

            var intro = document.getElementById('intro');
            var moved = false;

            function go() {
                if (moved) return;
                moved = true;
                intro.classList.add('leaving');
                setTimeout(function () { window.location.replace(NEXT); }, FADE);
            }

            var timer = setTimeout(go, STAY);

            document.getElementById('skip').addEventListener('click', function () {
                clearTimeout(timer); go();
            });
            intro.addEventListener('click', function (e) {
                if (e.target.id === 'skip') return;
                clearTimeout(timer); go();
            });
        })();
    </script>
</body>
</html>
