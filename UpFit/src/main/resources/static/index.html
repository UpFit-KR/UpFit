<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#eef2f8">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- [B][E] edit by smsong : black-translucent → default. viewport-fit=cover 제거와 한 쌍.
         iOS 가 상단 상태바 영역을 직접 채우고(=여백은 위), 웹뷰는 하단까지 꽉 차게 된다. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <title>UpFit</title>

    <!-- [B] edit by smsong : 공통 테마/인증 모듈 (<head> 최상단 → 인트로도 저장된 테마로 표시) -->
    <script src="theme.js?v=1.0.3"></script>
    <script src="auth.js?v=1.0.3"></script>
    <!-- [E] edit by smsong -->

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* [B] edit by smsong : :root = 라이트(기본) / [data-theme="dark"] = 다크 */
        :root {
            color-scheme: light;
            --grad: linear-gradient(100deg, #0ea5e9, #10b981);
            --dot-grad: linear-gradient(120deg, #0ea5e9, #10b981);
            --text-dim: rgba(14,33,56,0.66);
            --page-bg:
                radial-gradient(120% 90% at 50% -10%, rgba(56,189,248,0.22), transparent 55%),
                radial-gradient(120% 90% at 50% 110%, rgba(45,212,160,0.20), transparent 55%),
                #eef2f8;
            --glow-1: rgba(56,189,248,0.22);
            --glow-2: rgba(45,212,160,0.20);
            --logo-shadow: 0 20px 50px rgba(23,49,84,0.18);
            --skip-bg: rgba(255,255,255,0.7);
            --skip-bg-active: rgba(255,255,255,0.95);
            --skip-line: rgba(14,33,56,0.10);
            --skip-text: #0e2138;
            --font: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
            --grad: linear-gradient(100deg, #38bdf8, #2dd4a0);
            --dot-grad: linear-gradient(120deg, #38bdf8, #2dd4a0);
            --text-dim: rgba(232,240,251,0.72);
            --page-bg:
                radial-gradient(120% 90% at 50% -10%, rgba(56,189,248,0.16), transparent 55%),
                radial-gradient(120% 90% at 50% 110%, rgba(45,212,160,0.14), transparent 55%),
                #071120;
            --glow-1: rgba(56,189,248,0.14);
            --glow-2: rgba(45,212,160,0.14);
            --logo-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            --skip-bg: rgba(255,255,255,0.07);
            --skip-bg-active: rgba(255,255,255,0.16);
            --skip-line: rgba(255,255,255,0.12);
            --skip-text: rgba(232,240,251,0.85);
        }
        /* [E] edit by smsong */

        /* [B] edit by smsong : 하단 흰 여백(홈 인디케이터 영역) 제거 — 2차 수정
           루트 배경을 캔버스로 전파시키는 방식은 iOS 스탠드얼론에서 통하지 않았다.
           (단색은 화면 전체를 채우지만 그라데이션 페인팅 영역은 루트 박스에 갇힘)
           → 배경을 전용 고정 레이어(.app-bg)로 분리하고 뷰포트보다 사방 120px 크게 잡아
             세이프에어리어 바깥까지 덮는다. 여백은 iOS 가 상단 상태바 영역에 배치한다. */
        html {
            height: 100%;
            background-color: #eef2f8;   /* 캔버스 폴백(단색) */
            overflow: hidden;
        }
        :root[data-theme="dark"] { background-color: #071120; }
        body {
            height: 100%;
            font-family: var(--font);
            position: fixed; inset: 0; width: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            background: transparent;
        }
        .app-bg {
            position: fixed; inset: -120px; z-index: -1; pointer-events: none;
            background: var(--page-bg);
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        /* [E] edit by smsong */

        .intro {
            height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            background: transparent;
            position: relative; overflow: hidden;
            opacity: 1; transition: opacity 0.55s ease;
        }
        .intro.leaving { opacity: 0; }

        /* 은은한 광원 */
        .intro::before, .intro::after {
            content: ''; position: absolute; border-radius: 50%;
            pointer-events: none; filter: blur(30px);
        }
        .intro::before { width: 300px; height: 300px; top: -90px; right: -70px; background: var(--glow-1); }
        .intro::after  { width: 260px; height: 260px; bottom: -90px; left: -70px; background: var(--glow-2); }

        .intro-inner {
            position: relative; z-index: 1; text-align: center;
            opacity: 0; transform: translateY(14px);
            animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes rise { to { opacity: 1; transform: translateY(0); } }

        .logo {
            width: 108px; height: 108px; margin: 0 auto 22px;
            border-radius: 28px;
            display: block; object-fit: cover;
            box-shadow: var(--logo-shadow);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .name {
            font-size: 30px; font-weight: 800; letter-spacing: 2px;
            background: var(--grad);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .tagline {
            margin-top: 12px;
            font-size: 15px; line-height: 1.6;
            color: var(--text-dim);
            font-weight: 500;
        }

        .dots { margin-top: 30px; display: flex; gap: 7px; justify-content: center; }
        .dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--dot-grad);
            animation: blink 1.2s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .skip {
            position: absolute; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%;
            transform: translateX(-50%); z-index: 2;
            color: var(--skip-text);
            font-size: 13px; font-weight: 600;
            background: var(--skip-bg);
            border: 1px solid var(--skip-line);
            border-radius: 18px; padding: 9px 20px;
            cursor: pointer; font-family: var(--font);
            backdrop-filter: blur(6px);
        }
        .skip:active { background: var(--skip-bg-active); }

        @media (prefers-reduced-motion: reduce) {
            .intro-inner { animation: none; opacity: 1; transform: none; }
            .logo { animation: none; }
            .dots span { animation: none; opacity: 0.7; }
        }
    </style>
</head>
<body>
    <!-- [B][E] edit by smsong : 배경 전용 고정 레이어 -->
    <div class="app-bg" aria-hidden="true"></div>

    <div class="intro" id="intro">
        <div class="intro-inner">
            <!-- [B] edit by smsong : 테마별 로고 자동 교체 -->
            <img class="logo" src="icons/upfit-light.png" data-theme-logo alt="UpFit">
            <!-- [E] edit by smsong -->
            <div class="name">UPFIT</div>
            <div class="tagline">오늘의 운동과 식단을 기록하고<br>어제보다 얼마나 성장했는지 확인하세요</div>
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <button class="skip" id="skip">바로 시작하기</button>
    </div>

    <script>
        (function () {
            // [B] edit by smsong : 토큰이 유효하면 main, 아니면 login (만료 토큰은 정리)
            var Auth = window.UpFitAuth;
            var NEXT = 'login.html';
            if (Auth) {
                if (Auth.hasValidSession()) NEXT = 'main.html';
                else if (Auth.getToken()) Auth.clearSession();
            }
            // [E] edit by smsong

            var STAY = 2200;
            var FADE = 550;

            var intro = document.getElementById('intro');
            var moved = false;

            function go() {
                if (moved) return;
                moved = true;
                intro.classList.add('leaving');
                setTimeout(function () { window.location.replace(NEXT); }, FADE);
            }

            var timer = setTimeout(go, STAY);

            document.getElementById('skip').addEventListener('click', function () {
                clearTimeout(timer); go();
            });
            intro.addEventListener('click', function (e) {
                if (e.target.id === 'skip') return;
                clearTimeout(timer); go();
            });
        })();
    </script>
</body>
</html>
