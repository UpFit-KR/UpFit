<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#eef2f8">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- [B][E] edit by smsong : black-translucent → default. viewport-fit=cover 제거와 한 쌍.
         iOS 가 상단 상태바 영역을 직접 채우고(=여백은 위), 웹뷰는 하단까지 꽉 차게 된다. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UpFit">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <title>로그인 — UpFit</title>

    <!-- [B] edit by smsong : 공통 테마/인증 모듈 (로그인 페이지는 게이트 없이 유틸만 사용) -->
    <script src="theme.js?v=1.0.3"></script>
    <script src="auth.js?v=1.0.4"></script>
    <!-- [E] edit by smsong -->

    <link rel="stylesheet" href="login.css?v=1.0.6">
</head>
<body>
<!-- [B][E] edit by smsong : 배경 전용 고정 레이어 -->
<div class="app-bg" aria-hidden="true"></div>

<div class="login-page">
    <div class="login-card">
        <!-- 브랜드 -->
        <div class="brand">
            <!-- [B] edit by smsong : 테마별 로고 자동 교체 -->
            <img class="brand-logo" src="icons/upfit-light.png" data-theme-logo alt="UpFit">
            <!-- [E] edit by smsong -->
            <div class="brand-name">UPFIT</div>
            <div class="brand-tagline">운동과 식단을 기록하고<br>어제보다 나아진 나를 확인하세요</div>
        </div>

        <!-- 소셜 로그인 -->
        <div class="social-login">
            <div class="social-login-label">간편하게 시작하기</div>

            <button class="social-btn kakao" data-provider="kakao">
                <span class="social-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#191600" d="M12 3.2c-5.18 0-9.38 3.27-9.38 7.3 0 2.6 1.74 4.88 4.36 6.17-.19.68-.69 2.48-.79 2.86-.12.48.18.47.37.34.15-.1 2.4-1.63 3.38-2.29.67.1 1.36.15 2.06.15 5.18 0 9.38-3.27 9.38-7.3S17.18 3.2 12 3.2z"/>
                    </svg>
                </span>
                <span class="social-text">카카오로 시작하기</span>
            </button>

            <button class="social-btn naver" data-provider="naver">
                <span class="social-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#ffffff" d="M14.73 12.62 9.05 4H4v16h5.27v-8.62L14.95 20H20V4h-5.27z"/>
                    </svg>
                </span>
                <span class="social-text">네이버로 시작하기</span>
            </button>

            <button class="social-btn google" data-provider="google">
                <span class="social-icon">
                    <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                        <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
                        <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
                        <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/>
                        <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
                    </svg>
                </span>
                <span class="social-text">Google로 시작하기</span>
            </button>
        </div>

        <div class="login-footer">
            로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하게 됩니다
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="config.js?v=1.0.1"></script>
<script src="login.js?v=1.0.3"></script>
</body>
</html>
